{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="auth-card">
        <h1>{{ t('Login / لاگ ان') }}</h1>
        
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">{{ t('Username / یوزرنیم') }}</label>
                <input type="text" id="username" name="username" required placeholder="{{ t('Enter your username / اپنا یوزرنیم درج کریں') }}">
            </div>
            
            <button type="submit" class="btn btn-primary">{{ t('Login / لاگ ان') }}</button>
        </form>
        
        <p class="auth-link">
            {{ t('Don\'t have an account? / کوئی اکاؤنٹ نہیں ہے؟') }}
            <a href="{{ url_for('register') }}">{{ t('Register here / یہاں رجسٹر کریں') }}</a>
        </p>
    </div>
</div>

<style>
    .auth-card {
        max-width: 400px;
        margin: 60px auto;
        padding: 40px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border-left: 6px solid var(--accent);
    }
    
    .auth-card h1 {
        text-align: center;
        color: var(--accent);
        margin-bottom: 30px;
        font-size: 1.8rem;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--dark-text);
    }
    
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 1rem;
        transition: border-color 0.3s;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: var(--accent);
    }
    
    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, var(--accent) 0%, #a63d1e 100%);
        color: white;
    }
    
    .btn-primary:hover {
        background: linear-gradient(135deg, #c9533a 0%, #8a2f17 100%);
    }
    
    .alert {
        margin-bottom: 20px;
        padding: 12px 16px;
        border-radius: 6px;
        font-weight: 500;
    }
    
    .alert-error {
        background-color: #ffebee;
        color: #c62828;
        border-left: 4px solid #c62828;
    }
    
    .auth-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 0.95rem;
    }
    
    .auth-link a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-link a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
